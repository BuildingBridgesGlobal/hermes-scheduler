name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci || npm install
      - name: Test
        run: npm test
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
